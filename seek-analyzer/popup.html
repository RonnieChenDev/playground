<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SEEK Job Analyser</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 260px;
      padding: 16px;
      background: white;
      color: #111827;
    }

    h2 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .sub {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 16px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.ok { background: #16a34a; }
    .dot.warn { background: #ca8a04; }

    a {
      display: block;
      margin-top: 14px;
      font-size: 12px;
      color: #6366f1;
      text-decoration: none;
      cursor: pointer;
    }

    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h2>SEEK Job Analyser</h2>
  <p class="sub">Inline AI fit scoring for SEEK listings</p>

  <div class="status-row" id="key-status">
    <span class="dot" id="key-dot"></span>
    <span id="key-label"></span>
  </div>

  <div class="status-row" id="profile-status">
    <span class="dot" id="profile-dot"></span>
    <span id="profile-label"></span>
  </div>

  <a id="options-link">⚙ Open Settings</a>

  <script src="dist/popup.js"></script>
</body>
</html>
